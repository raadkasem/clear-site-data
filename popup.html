<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </div>
      <div>
        <h1>Clear Site Data</h1>
        <p class="subtitle">Remove stored data for current site</p>
      </div>
    </div>

    <!-- Current site pill -->
    <div id="site-info" class="site-pill">
      <svg class="site-pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      <span id="site-url"></span>
    </div>

    <!-- Options -->
    <div class="options-card">
      <label class="option" data-for="cookies">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"/><circle cx="8.5" cy="8.5" r="1"/><circle cx="12" cy="14" r="1"/><circle cx="16" cy="10" r="1"/></svg>
          <span>Cookies</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="cookies" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="option" data-for="localStorage">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h.01"/></svg>
          <span>Local & session storage</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="localStorage" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="option" data-for="indexedDB">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          <span>IndexedDB</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="indexedDB" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="option" data-for="cacheStorage">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          <span>Cache storage</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="cacheStorage" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="option" data-for="serviceWorkers">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Service workers</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="serviceWorkers" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>

      <div class="option-divider"></div>

      <label class="option" data-for="thirdPartyCookies">
        <div class="option-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6"/><path d="M23 11h-6"/></svg>
          <span>Include third-party cookies</span>
        </div>
        <div class="toggle">
          <input type="checkbox" id="thirdPartyCookies" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <!-- Clear button -->
    <button id="clear-btn" class="clear-btn">
      <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      <span id="btn-text">Clear site data</span>
    </button>

    <!-- Status -->
    <div id="status" class="status"></div>

    <!-- Developer footer -->
    <div class="footer">
      <span class="footer-text">by</span>
      <a href="https://raadkasem.dev" target="_blank" rel="noopener" class="footer-link">raadkasem.dev</a>
      <a href="https://github.com/raadkasem" target="_blank" rel="noopener" class="footer-github" title="GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
